name: Release Drafter

on:
 workflow_run:
  workflows: ["Code Style"] # Must match the exact 'name:' of your code style workflow
  types:
   - completed

permissions:
 contents: write
 pull-requests: read

jobs:
 update_release_draft:
  # Crucial safety check: Only run if the Code Style workflow actually succeeded
  if: ${{ github.event.workflow_run.conclusion == 'success' }}

  permissions:
   contents: write
   pull-requests: read
  runs-on: ubuntu-latest
  steps:
   - name: Run Release Drafter
     uses: release-drafter/release-drafter@v6
     env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}